<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — UnboxProof</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0a0a1e,#1a1a3e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center;padding:40px}
    .container{max-width:480px}
    .code{font-size:120px;font-weight:900;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
    h1{font-size:28px;font-weight:700;margin-bottom:12px}
    p{font-size:16px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:36px}
    .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .btn{padding:13px 24px;border-radius:10px;font-weight:600;font-size:15px;text-decoration:none;transition:.2s}
    .btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(79,70,229,0.4)}
    .btn-ghost{background:rgba(255,255,255,0.08);color:white;border:1px solid rgba(255,255,255,0.15)}
    .btn-ghost:hover{background:rgba(255,255,255,0.14)}
    .icon{font-size:48px;margin-bottom:20px}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔍</div>
    <div class="code">404</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas ou a été déplacée. Pas de panique — retournez à l'accueil.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Retour à l'accueil</a>
      <a href="/demo.html" class="btn btn-ghost">Voir la démo</a>
    </div>
  </div>
</body>
</html>
