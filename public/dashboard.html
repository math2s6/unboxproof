<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord — SafeTrade</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<nav class="navbar">
  <a href="/" class="nav-logo">SafeTrade</a>
  <div class="nav-search" style="display:none"></div>
  <div class="nav-actions">
    <div id="nav-auth" style="display:flex;gap:0.5rem">
      <a href="/login.html" class="btn btn-ghost btn-sm">Connexion</a>
    </div>
    <div id="nav-user" style="display:none" class="nav-user">
      <span class="nav-balance" id="nav-balance">—</span>
      <div class="dropdown" style="position:relative">
        <button class="nav-notif-btn" id="notif-btn">🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span></button>
        <div class="notif-panel" id="notif-panel" style="display:none"></div>
      </div>
      <div class="dropdown">
        <button class="nav-username-btn" id="nav-username-btn"><span id="nav-username">Profil</span> ▾</button>
        <div class="dropdown-menu" id="user-dropdown" style="display:none">
          <a href="/create-listing.html" class="dropdown-item">➕ Vendre un article</a>
          <a href="/messages.html" class="dropdown-item">💬 Messages</a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item danger" onclick="logout()">🚪 Déconnexion</button>
        </div>
      </div>
    </div>
    <div id="nav-admin" style="display:none"><a href="/admin/" class="btn btn-warning btn-sm">Admin</a></div>
  </div>
</nav>

<div class="container" style="padding-top:2rem;padding-bottom:3rem">
  <!-- User stats -->
  <div id="user-header" style="margin-bottom:2rem">
    <div class="loading-overlay" style="min-height:100px"><div class="spinner"></div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="dashboard-tabs">
    <button class="tab-btn active" data-tab="purchases" onclick="switchTab('purchases')">🛒 Mes achats</button>
    <button class="tab-btn" data-tab="sales" onclick="switchTab('sales')">💰 Mes ventes</button>
    <button class="tab-btn" data-tab="listings" onclick="switchTab('listings')">📋 Mes annonces</button>
  </div>

  <div id="tab-purchases" class="tab-panel active" style="padding-top:1.5rem">
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>
  <div id="tab-sales" class="tab-panel" style="padding-top:1.5rem">
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>
  <div id="tab-listings" class="tab-panel" style="padding-top:1.5rem">
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>
</div>

<!-- TOPUP MODAL -->
<div id="topup-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Recharger mon compte</h3>
      <button class="modal-close" onclick="document.getElementById('topup-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Montant à ajouter (€)</label>
        <input type="number" id="topup-amount" class="form-control" placeholder="100" min="1" max="10000">
      </div>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" onclick="setTopup(50)">+50€</button>
        <button class="btn btn-ghost btn-sm" onclick="setTopup(100)">+100€</button>
        <button class="btn btn-ghost btn-sm" onclick="setTopup(200)">+200€</button>
        <button class="btn btn-ghost btn-sm" onclick="setTopup(500)">+500€</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('topup-modal').style.display='none'">Annuler</button>
      <button class="btn btn-success" onclick="doTopup()">Recharger</button>
    </div>
  </div>
</div>

<!-- SHIP MODAL -->
<div id="ship-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Confirmer l'expédition</h3>
      <button class="modal-close" onclick="document.getElementById('ship-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Transporteur</label>
        <select id="ship-carrier" class="form-control">
          <option value="La Poste">La Poste / Colissimo</option>
          <option value="Chronopost">Chronopost</option>
          <option value="DHL">DHL</option>
          <option value="UPS">UPS</option>
          <option value="Mondial Relay">Mondial Relay</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Numéro de suivi <span>*</span></label>
        <input type="text" id="ship-tracking" class="form-control" placeholder="Ex: 1A2B3C4D5E6F">
      </div>
      <div class="alert alert-info">Une notification sera envoyée à l'acheteur avec ces informations.</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('ship-modal').style.display='none'">Annuler</button>
      <button class="btn btn-primary" onclick="confirmShip()">Confirmer l'envoi</button>
    </div>
  </div>
</div>

<!-- RATE MODAL -->
<div id="rate-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Évaluer le vendeur</h3>
      <button class="modal-close" onclick="document.getElementById('rate-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Note</label>
        <div id="star-picker" style="display:flex;gap:0.5rem;font-size:2rem;cursor:pointer">
          <span data-v="1">☆</span><span data-v="2">☆</span><span data-v="3">☆</span><span data-v="4">☆</span><span data-v="5">☆</span>
        </div>
        <input type="hidden" id="rate-score" value="0">
      </div>
      <div class="form-group">
        <label class="form-label">Commentaire (optionnel)</label>
        <textarea id="rate-comment" class="form-control" rows="3" placeholder="Décrivez votre expérience..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('rate-modal').style.display='none'">Annuler</button>
      <button class="btn btn-primary" onclick="submitRating()">Envoyer l'avis</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  let currentUser = null;
  let shipOrderId = null;
  let rateOrderId = null;
  let activeTab = 'purchases';

  document.addEventListener('DOMContentLoaded', async () => {
    const user = getCurrentUser();
    if (!user || !API.token) { window.location.href = '/login.html'; return; }
    renderNav(user);
    loadNotifBadge();
    currentUser = user;

    await Promise.all([loadUserHeader(), loadTab('purchases')]);

    // Star picker
    const picker = document.getElementById('star-picker');
    picker.querySelectorAll('span').forEach(star => {
      star.addEventListener('click', () => {
        const val = parseInt(star.dataset.v);
        document.getElementById('rate-score').value = val;
        picker.querySelectorAll('span').forEach((s, i) => s.textContent = i < val ? '★' : '☆');
      });
    });
  });

  async function loadUserHeader() {
    try {
      const user = await API.get('/api/auth/me');
      currentUser = user;
      localStorage.setItem('user', JSON.stringify(user));
      document.getElementById('nav-balance').textContent = formatPrice(user.balance);

      document.getElementById('user-header').innerHTML = `
        <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;padding:1.5rem;background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow)">
          <div class="profile-avatar" style="width:72px;height:72px;font-size:2rem;flex-shrink:0">
            ${user.avatar_url ? `<img src="${user.avatar_url}" alt="">` : user.username.charAt(0).toUpperCase()}
          </div>
          <div style="flex:1">
            <h2 style="margin-bottom:0.25rem">${escHtml(user.username)}</h2>
            <div style="font-size:0.9rem;color:var(--text-muted)">${user.email}</div>
            <div style="margin-top:0.5rem;font-size:0.85rem">${starsHtml(user.rating_avg)} <span style="color:var(--text-muted)">${user.rating_count} avis</span></div>
          </div>
          <div style="display:flex;gap:1rem;flex-wrap:wrap">
            <div style="text-align:center">
              <div style="font-size:1.5rem;font-weight:800;color:var(--primary)">${formatPrice(user.balance)}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">Solde disponible</div>
            </div>
            ${user.escrow_balance > 0 ? `
            <div style="text-align:center">
              <div style="font-size:1.5rem;font-weight:800;color:var(--warning)">${formatPrice(user.escrow_balance)}</div>
              <div style="font-size:0.75rem;color:var(--text-muted)">En séquestre</div>
            </div>` : ''}
          </div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
            <button class="btn btn-success btn-sm" onclick="document.getElementById('topup-modal').style.display='flex'">+ Recharger</button>
            <a href="/create-listing.html" class="btn btn-primary btn-sm">+ Vendre un article</a>
          </div>
        </div>
      `;
    } catch (e) {}
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `tab-${tab}`));
    loadTab(tab);
  }

  async function loadTab(tab) {
    const el = document.getElementById(`tab-${tab}`);
    el.innerHTML = '<div class="loading-overlay"><div class="spinner"></div></div>';
    try {
      if (tab === 'purchases') await loadPurchases(el);
      else if (tab === 'sales') await loadSales(el);
      else if (tab === 'listings') await loadMyListings(el);
    } catch (e) {
      el.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">${e.message}</p></div>`;
    }
  }

  async function loadPurchases(el) {
    const orders = await API.get('/api/orders?role=buyer');
    if (!orders.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛒</div><h3>Aucun achat</h3><p>Parcourez les annonces et faites votre premier achat.</p><a href="/" class="btn btn-primary" style="margin-top:1rem">Voir les annonces</a></div>`;
      return;
    }
    el.innerHTML = orders.map(o => renderOrderRow(o, 'buyer')).join('');
  }

  async function loadSales(el) {
    const orders = await API.get('/api/orders?role=seller');
    if (!orders.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💰</div><h3>Aucune vente</h3><p>Créez votre première annonce pour commencer à vendre.</p><a href="/create-listing.html" class="btn btn-primary" style="margin-top:1rem">Vendre un article</a></div>`;
      return;
    }
    el.innerHTML = orders.map(o => renderOrderRow(o, 'seller')).join('');
  }

  async function loadMyListings(el) {
    const listings = await API.get(`/api/listings/by-seller/${currentUser.id}`);
    if (!listings.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div><h3>Aucune annonce</h3><a href="/create-listing.html" class="btn btn-primary" style="margin-top:1rem">Créer une annonce</a></div>`;
      return;
    }
    el.innerHTML = `
      <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
        <a href="/create-listing.html" class="btn btn-primary btn-sm">+ Nouvelle annonce</a>
      </div>
      ${listings.map(l => `
        <div class="card" style="margin-bottom:1rem">
          <div class="card-body" style="display:flex;gap:1rem;align-items:center">
            <img src="${l.thumbnail || '/api/placeholder/0'}" style="width:72px;height:72px;object-fit:cover;border-radius:var(--radius-sm);flex-shrink:0">
            <div style="flex:1">
              <a href="/listing.html?id=${l.id}" style="font-weight:600;color:var(--text)">${escHtml(l.title)}</a>
              <div style="font-size:0.85rem;color:var(--text-muted);margin-top:0.25rem">${l.category} • ${formatDate(l.created_at)} • 👁 ${l.views}</div>
            </div>
            <div style="text-align:right">
              <div style="font-size:1.1rem;font-weight:800;color:var(--primary)">${formatPrice(l.price)}</div>
              ${getListingStatusBadge(l.status)}
            </div>
            <div style="display:flex;flex-direction:column;gap:0.5rem">
              <a href="/listing.html?id=${l.id}" class="btn btn-ghost btn-sm">Voir</a>
              ${l.status === 'active' ? `<button class="btn btn-danger btn-sm" onclick="deleteListing(${l.id})">Supprimer</button>` : ''}
            </div>
          </div>
        </div>
      `).join('')}
    `;
  }

  function getListingStatusBadge(status) {
    const map = {
      active: '<span class="badge badge-success">Actif</span>',
      reserved: '<span class="badge badge-warning">Réservé</span>',
      sold: '<span class="badge badge-secondary">Vendu</span>',
      removed: '<span class="badge badge-danger">Supprimé</span>',
    };
    return map[status] || `<span class="badge badge-secondary">${status}</span>`;
  }

  function renderOrderRow(o, role) {
    const actions = getOrderActions(o, role);
    return `
      <div class="card" style="margin-bottom:1rem">
        <div class="card-body" style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap">
          <img src="${o.thumbnail || '/api/placeholder/0'}" style="width:72px;height:72px;object-fit:cover;border-radius:var(--radius-sm);flex-shrink:0;cursor:pointer" onclick="window.location.href='/order.html?id=${o.id}'">
          <div style="flex:1;min-width:200px">
            <a href="/order.html?id=${o.id}" style="font-weight:600;color:var(--text)">${escHtml(o.title)}</a>
            <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.2rem">
              ${role === 'buyer' ? `Vendu par ${escHtml(o.seller_name)}` : `Acheté par ${escHtml(o.buyer_name)}`} • ${formatDateTime(o.created_at)}
            </div>
          </div>
          <div style="text-align:right;margin-right:0.5rem">
            <div style="font-size:1.1rem;font-weight:800;color:var(--primary)">${formatPrice(o.amount)}</div>
            ${getStatusBadge(o.status)}
          </div>
          <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <a href="/order.html?id=${o.id}" class="btn btn-ghost btn-sm">Détails</a>
            ${actions}
          </div>
        </div>
      </div>
    `;
  }

  function getOrderActions(o, role) {
    let html = '';
    if (role === 'buyer') {
      if (o.status === 'paid') html += `<button class="btn btn-danger btn-sm" onclick="cancelOrder(${o.id})">Annuler</button>`;
      if (o.status === 'shipped') html += `<a href="/order.html?id=${o.id}" class="btn btn-success btn-sm">Confirmer réception</a>`;
      if (o.status === 'unboxing_pending') html += `<a href="/unboxing.html?orderId=${o.id}" class="btn btn-warning btn-sm">Faire l'unboxing</a>`;
      if (o.status === 'unboxing_uploaded') {
        html += `<button class="btn btn-success btn-sm" onclick="confirmOrder(${o.id})">Confirmer</button>`;
        html += `<a href="/dispute.html?orderId=${o.id}" class="btn btn-danger btn-sm">Litige</a>`;
      }
      if (o.status === 'completed') html += `<button class="btn btn-secondary btn-sm" onclick="openRateModal(${o.id})">⭐ Évaluer</button>`;
    } else if (role === 'seller') {
      if (o.status === 'paid') html += `<button class="btn btn-primary btn-sm" onclick="openShipModal(${o.id})">Expédier</button>`;
    }
    return html;
  }

  async function cancelOrder(id) {
    if (!confirm('Annuler cette commande et obtenir un remboursement ?')) return;
    try {
      await API.post(`/api/orders/${id}/cancel`);
      showToast('Commande annulée et remboursée');
      loadTab('purchases');
      loadUserHeader();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function confirmOrder(id) {
    if (!confirm('Confirmer la réception et libérer les fonds au vendeur ?')) return;
    try {
      await API.post(`/api/unboxing/${id}/confirm`);
      showToast('Transaction complétée !');
      loadTab('purchases');
      loadUserHeader();
    } catch (e) { showToast(e.message, 'error'); }
  }

  function openShipModal(id) {
    shipOrderId = id;
    document.getElementById('ship-tracking').value = '';
    document.getElementById('ship-modal').style.display = 'flex';
  }

  async function confirmShip() {
    const tracking = document.getElementById('ship-tracking').value.trim();
    const carrier = document.getElementById('ship-carrier').value;
    if (!tracking) return showToast('Numéro de suivi requis', 'error');
    try {
      await API.post(`/api/orders/${shipOrderId}/ship`, { tracking_number: tracking, carrier });
      showToast('Expédition confirmée !');
      document.getElementById('ship-modal').style.display = 'none';
      loadTab('sales');
    } catch (e) { showToast(e.message, 'error'); }
  }

  function openRateModal(id) {
    rateOrderId = id;
    document.getElementById('rate-score').value = 0;
    document.querySelectorAll('#star-picker span').forEach(s => s.textContent = '☆');
    document.getElementById('rate-comment').value = '';
    document.getElementById('rate-modal').style.display = 'flex';
  }

  async function submitRating() {
    const score = parseInt(document.getElementById('rate-score').value);
    if (!score) return showToast('Choisissez une note', 'error');
    try {
      await API.post('/api/ratings', { orderId: rateOrderId, score, comment: document.getElementById('rate-comment').value });
      showToast('Avis envoyé !');
      document.getElementById('rate-modal').style.display = 'none';
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteListing(id) {
    if (!confirm('Supprimer cette annonce ?')) return;
    try {
      await API.delete(`/api/listings/${id}`);
      showToast('Annonce supprimée');
      loadTab('listings');
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function doTopup() {
    const amount = parseFloat(document.getElementById('topup-amount').value);
    if (!amount || amount <= 0) return showToast('Montant invalide', 'error');
    try {
      const data = await API.post('/api/auth/me/topup', { amount });
      showToast(data.message);
      document.getElementById('topup-modal').style.display = 'none';
      loadUserHeader();
    } catch (e) { showToast(e.message, 'error'); }
  }

  function setTopup(v) { document.getElementById('topup-amount').value = v; }

  function escHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>
</body>
</html>
